<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FT CS - Dallas FF</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Oxanium:wght@300;400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --bg:#f0f6ff; --bg2:#e4eeff; --bg3:#d6e8ff;
      --surface:#ffffff;
      --accent:#1565c0; --accent2:#1e88e5; --accent3:#42a5f5;
      --gold:#f59e0b;
      --text:#0d1b3e; --muted:#5a7aaa;
      --border:rgba(21,101,192,0.15);
      --glow:0 8px 32px rgba(21,101,192,0.18);
      --danger:#d32f2f;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh;}

    nav{padding:1rem 4rem;background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 16px rgba(21,101,192,0.08);position:sticky;top:0;z-index:100;}
    .logo-area{display:flex;align-items:center;gap:0.8rem;text-decoration:none;}
    .logo-img-wrap{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 12px rgba(21,101,192,0.3);overflow:hidden;}
    .logo-img-wrap img{width:100%;height:100%;object-fit:cover;}
    .logo-text{font-family:'Oxanium',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent);}
    .logo-text span{color:var(--accent3);}
    .back-btn{color:var(--muted);text-decoration:none;font-family:'Rajdhani';font-weight:600;text-transform:uppercase;font-size:0.9rem;letter-spacing:1px;transition:color 0.2s;display:flex;align-items:center;gap:0.4rem;}
    .back-btn:hover{color:var(--accent);}

    .header-banner-container{width:100%;overflow:hidden;line-height:0;}
    .header-static-img{width:100%;height:180px;display:block;object-fit:cover;object-position:center;}

    .order-section{padding:3rem 4rem 5rem;max-width:1400px;margin:0 auto;}
    .order-container{display:grid;grid-template-columns:1fr 360px;gap:2.5rem;align-items:start;}
    .order-steps{display:flex;flex-direction:column;gap:1.8rem;}

    .step-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(21,101,192,0.07);transition:border-color 0.3s,box-shadow 0.2s;}
    .step-card.done{border-color:#66bb6a;box-shadow:0 4px 20px rgba(76,175,80,0.12);}
    .step-header{background:linear-gradient(135deg,rgba(21,101,192,0.05),rgba(66,165,245,0.05));padding:1.1rem 1.5rem;display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);}
    .step-number{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;font-family:'Oxanium';font-size:1rem;flex-shrink:0;transition:background 0.3s;}
    .step-card.done .step-number{background:linear-gradient(135deg,#388e3c,#66bb6a);}
    .step-title{font-family:'Rajdhani';font-size:1.2rem;font-weight:700;color:var(--text);letter-spacing:0.5px;}
    .step-body{padding:1.5rem;}

    .pkg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;}
    .pkg-card{background:var(--bg);border:2px solid var(--border);border-radius:14px;padding:1.1rem 0.9rem;text-align:center;cursor:pointer;transition:all 0.22s;position:relative;user-select:none;}
    .pkg-card:hover:not(.disabled){border-color:var(--accent2);background:rgba(30,136,229,0.06);transform:translateY(-3px);box-shadow:0 6px 18px rgba(21,101,192,0.15);}
    .pkg-card.selected{border-color:var(--accent);background:rgba(21,101,192,0.09);box-shadow:0 0 0 3px rgba(21,101,192,0.14);}
    .pkg-card.selected::after{content:'✓';position:absolute;top:-10px;right:-10px;width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;font-weight:bold;font-size:0.75rem;display:flex;align-items:center;justify-content:center;}
    .pkg-card.full{background:#fff3f3;border-color:#ffcdd2;cursor:not-allowed;pointer-events:none;}

    .slot-full-label{display:none;position:absolute;inset:0;background:rgba(211,47,47,0.1);border-radius:12px;align-items:center;justify-content:center;font-family:'Rajdhani';font-weight:800;font-size:0.72rem;color:var(--danger);letter-spacing:2px;}
    .pkg-card.full .slot-full-label{display:flex;}

    .pkg-icon{font-size:1.5rem;margin-bottom:0.45rem;}
    .pkg-title{font-family:'Rajdhani';font-size:0.97rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:0.2rem;}
    .pkg-price{font-family:'Oxanium';font-size:1.05rem;font-weight:800;color:var(--accent);margin-top:0.4rem;}

    .slot-badge{display:inline-flex;align-items:center;gap:3px;font-size:0.68rem;font-weight:700;font-family:'Rajdhani';letter-spacing:0.5px;padding:2px 8px;border-radius:100px;margin-top:0.4rem;}
    .slot-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
    .slot-low{background:#fff8e1;color:#e65100;border:1px solid #ffcc02;}
    .slot-empty{background:#ffebee;color:var(--danger);border:1px solid #ef9a9a;}

    .form-group{display:flex;flex-direction:column;gap:0.5rem;}
    .form-label{font-family:'Rajdhani';font-size:0.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
    .form-input{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);padding:0.75rem 1rem;outline:none;}

    .summary-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:1.8rem;box-shadow:0 6px 28px rgba(21,101,192,0.1);position:sticky;top:90px;}
    .sum-title{font-family:'Oxanium';font-size:1.2rem;font-weight:800;color:var(--accent);margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:2px solid var(--bg3);}
    .sum-row{display:flex;justify-content:space-between;margin-bottom:0.9rem;font-size:0.9rem;}
    .sum-total-value{font-family:'Oxanium';font-size:2.1rem;color:var(--accent);font-weight:800;}

    .btn-submit{width:100%;font-family:'Rajdhani';font-size:1.05rem;font-weight:700;padding:1rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:10px;cursor:pointer;box-shadow:0 6px 20px rgba(21,101,192,0.35);}
    .btn-submit:disabled{opacity:0.4;cursor:not-allowed;}

    /* PERBAIKAN Z-INDEX MODAL */
    .modal-overlay {
      position: fixed; top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(13, 27, 62, 0.9); 
      backdrop-filter: blur(10px); 
      display: none; align-items: center; justify-content: center; 
      z-index: 999999 !important; /* Nilai sangat tinggi */
      opacity: 0; transition: opacity 0.3s ease;
    }
    .modal-overlay.show { display: flex; opacity: 1; }
    .modal-content {
      background: var(--surface); border-radius: 24px; 
      width: 95%; max-width: 480px; padding: 25px; text-align: center;
      position: relative; z-index: 1000000 !important;
      transform: translateY(30px); transition: transform 0.3s ease;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .modal-overlay.show .modal-content { transform: translateY(0); }
    .inv-details {text-align: left; background: var(--bg); padding: 1rem; border-radius: 12px; margin: 1rem 0; font-size: 0.9rem; border: 1px dashed var(--accent3);}
    .qr-placeholder img {width: 180px; height: 180px; border-radius: 10px; border: 3px solid var(--accent3); padding: 5px; background: #fff;}
    
    /* Agar Notifikasi SweetAlert di atas Modal */
    .swal2-container { z-index: 2000000 !important; }

    @media(max-width:1024px){.order-container{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo-area">
    <div class="logo-img-wrap"><img src="assets/dallas.png" alt="Logo"></div>
    <div class="logo-text">Dallas <span>FT CS</span></div>
  </a>
  <a href="index.html" class="back-btn">← Kembali</a>
</nav>

<div class="header-banner-container">
  <img src="assets/banner2.jpg" alt="Banner" class="header-static-img">
</div>

<section class="order-section">
  <div class="order-container">
    <div class="order-steps">
      <div class="step-card" id="card-p1">
        <div class="step-header">
          <div class="step-number" id="num-p1">1</div>
          <div class="step-title">Paket 1 — Jenis & Harga</div>
        </div>
        <div class="step-body">
          <div class="pkg-grid">
            <div class="pkg-card" onclick="selectP1(this,'Fee 2K · PP 6K',2000)">
              <div class="pkg-icon">💰</div>
              <div class="pkg-title">Fee 2K · PP 6K</div>
              <div class="pkg-price">Rp 2.000</div>
            </div>
            <div class="pkg-card" onclick="selectP1(this,'Fee 5K · PP 15K',5000)">
              <div class="pkg-icon">💎</div>
              <div class="pkg-title">Fee 5K · PP 15K</div>
              <div class="pkg-price">Rp 5.000</div>
            </div>
          </div>
        </div>
      </div>

      <div class="step-card" id="card-p2">
        <div class="step-header">
          <div class="step-number" id="num-p2">2</div>
          <div class="step-title">Paket 2 — Formasi CS</div>
        </div>
        <div class="step-body">
          <div class="pkg-grid">
            <div class="pkg-card" onclick="selectP2(this,'1VS1')">1 VS 1</div>
            <div class="pkg-card" onclick="selectP2(this,'2VS2')">2 VS 2</div>
            <div class="pkg-card" onclick="selectP2(this,'4VS4')">4 VS 4</div>
          </div>
        </div>
      </div>

      <div class="step-card" id="card-p3">
        <div class="step-header">
          <div class="step-number" id="num-p3">3</div>
          <div class="step-title">Paket 3 — Pilih Jam Sesi</div>
        </div>
        <div class="step-body">
          <div class="pkg-grid" id="grid-p3"></div>
        </div>
      </div>

      <div class="step-card">
        <div class="step-header">
          <div class="step-number">4</div>
          <div class="step-title">Data WhatsApp</div>
        </div>
        <div class="step-body">
          <div class="form-group">
            <label class="form-label">No. WhatsApp Aktif</label>
            <input type="tel" id="acc-wa" class="form-input" placeholder="0812xxxx" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/>
          </div>
        </div>
      </div>
    </div>

    <div class="summary-wrapper">
      <div class="summary-card">
        <div class="sum-title">📋 Ringkasan</div>
        <div class="sum-row"><span>Paket 1</span><span id="sum-p1">—</span></div>
        <div class="sum-row"><span>Formasi</span><span id="sum-p2">—</span></div>
        <div class="sum-row"><span>Sesi</span><span id="sum-p3">—</span></div>
        <div class="sum-total-value" id="sum-total">Rp 0</div>
        <button class="btn-submit" id="btn-order" onclick="submitOrder()" disabled>Order Sekarang 💳</button>
      </div>
    </div>
  </div>
</section>

<div id="checkout-modal" class="modal-overlay">
  <div class="modal-content">
    <h2 style="font-family:'Oxanium'; margin-bottom: 10px;">INVOICE</h2>
    <div id="inv-details" class="inv-details"></div>
    <div class="qr-placeholder">
      <img src="assets/ALLPAY.jpg" alt="QRIS">
      <p style="margin-top:8px; font-size:0.85rem;">Scan QRIS untuk membayar</p>
    </div>
    <div style="margin-top: 15px; text-align: left;">
      <label style="font-weight: bold; font-size: 0.85rem;">Upload Bukti Transfer:</label>
      <input type="file" id="bukti-tf-file" accept="image/*" style="width:100%; margin-top:5px;">
    </div>
    <button id="btn-konfirmasi" onclick="kirimKeTelegram()" class="btn-submit" style="margin-top:15px;">KONFIRMASI BAYAR</button>
    <button onclick="closeModal()" style="margin-top: 10px; background: none; border: none; color: var(--muted); cursor: pointer; text-decoration:underline;">Batal</button>
  </div>
</div>

<script>
// ════════ FIREBASE CONFIG ════════
const firebaseConfig = {
  apiKey: "AIzaSyBkwQMwJqGKmI1ng8m-tSXUKf0xNqJC0hg",
  authDomain: "dallas-2cde6.firebaseapp.com",
  projectId: "dallas-2cde6",
  storageBucket: "dallas-2cde6.firebasestorage.app",
  messagingSenderId: "1022457000757",
  appId: "1:1022457000757:web:2f2833a5628b04849ed27c",
  measurementId: "G-BFZC48YZZG",
  databaseURL: "https://dallas-2cde6-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const TELEGRAM_TOKEN = '8074314633:AAHBAVptcU-P496oJJHoWyyc8JpB1pVZf04';
const TELEGRAM_CHAT_ID = '-1003881733798';
const MAX_SLOT = 4;
const JAM_LIST = ['15:00','16:00','17:00','18:00','19:00','20:00','21:00'];

const state = { p1:null, p2:null, p3:null, orderId:'' };
const todayKey = new Date().toISOString().slice(0,10);
let globalSlots = {};

function listenToSlots() {
  db.ref('slots/' + todayKey).on('value', (snap) => {
    globalSlots = snap.val() || {};
    renderJam();
  });
}

function renderJam() {
  const grid = document.getElementById('grid-p3');
  grid.innerHTML = JAM_LIST.map(jam => {
    const used = globalSlots[jam] || 0;
    const sisa = MAX_SLOT - used;
    const full = sisa <= 0;
    const sel  = state.p3 === jam;
    return `
      <div class="pkg-card${sel?' selected':''}${full?' full':''}" onclick="${full?'':'selectP3(this,\''+jam+'\')'}">
        <div class="slot-full-label">PENUH</div>
        <div class="pkg-title">${jam}</div>
        <div class="slot-badge ${full?'slot-empty':(sisa===1?'slot-low':'slot-ok')}">
          ${full?'🔴 PENUH':(sisa===1?'🟡 Sisa 1':'🟢 Sisa '+sisa)}
        </div>
      </div>`;
  }).join('');
}

function selectP1(el, label, price) {
  document.querySelectorAll('#card-p1 .pkg-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  state.p1 = { label, price };
  document.getElementById('sum-p1').textContent = label;
  document.getElementById('sum-total').textContent = 'Rp '+price.toLocaleString('id-ID');
  document.getElementById('card-p1').classList.add('done');
  document.getElementById('num-p1').textContent = '✓';
  updateProgress();
}

function selectP2(el, f) {
  document.querySelectorAll('#card-p2 .pkg-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  state.p2 = f;
  document.getElementById('sum-p2').textContent = f;
  document.getElementById('card-p2').classList.add('done');
  document.getElementById('num-p2').textContent = '✓';
  updateProgress();
}

function selectP3(el, jam) {
  state.p3 = jam;
  renderJam();
  document.getElementById('sum-p3').textContent = jam;
  document.getElementById('card-p3').classList.add('done');
  document.getElementById('num-p3').textContent = '✓';
  updateProgress();
}

function updateProgress() {
  document.getElementById('btn-order').disabled = !(state.p1 && state.p2 && state.p3);
}

function submitOrder() {
  const wa = document.getElementById('acc-wa').value.trim();
  if (!wa || wa.length < 9) return Swal.fire('Error','Isi nomor WA!','error');

  state.orderId = 'DLS-FT-' + Math.floor(100000 + Math.random() * 900000);
  document.getElementById('inv-details').innerHTML = `
    <p>ID: <b>${state.orderId}</b></p>
    <p>Paket: <b>${state.p1.label}</b></p>
    <p>Formasi: <b>${state.p2}</b></p>
    <p>Sesi: <b>${state.p3}</b></p>
    <p>WA: <b>${wa}</b></p>`;
  
  const modal = document.getElementById('checkout-modal');
  modal.style.display = 'flex';
  setTimeout(() => modal.classList.add('show'), 10);
}

function closeModal() {
  const modal = document.getElementById('checkout-modal');
  modal.classList.remove('show');
  setTimeout(() => modal.style.display = 'none', 300);
}

async function kirimKeTelegram() {
  const fileInput = document.getElementById('bukti-tf-file');
  if (fileInput.files.length === 0) return Swal.fire('Peringatan','Upload bukti transfer!','warning');

  const btn = document.getElementById('btn-konfirmasi');
  const originalText = btn.innerText;
  btn.innerText = 'Mengirim...';
  btn.disabled = true;

  const formData = new FormData();
  formData.append('chat_id', TELEGRAM_CHAT_ID);
  formData.append('photo', fileInput.files[0]);
  formData.append('caption', `🚀 *PESANAN BARU FT CS*\nID: ${state.orderId}\nSesi: ${state.p3}\nFormasi: ${state.p2}\nPaket: ${state.p1.label}\nWA: ${document.getElementById('acc-wa').value}`);

  try {
    const res = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, { method:'POST', body:formData });
    if (res.ok) {
      await db.ref('slots/' + todayKey + '/' + state.p3).transaction(c => (c || 0) + 1);
      Swal.fire({
        title: 'Berhasil!',
        text: 'Pesanan telah dikirim ke admin dan tunggu admin menginvite kamu ke gb.',
        icon: 'success',
        confirmButtonColor: '#1565c0'
      }).then(() => location.reload());
    } else {
      throw new Error('Gagal kirim');
    }
  } catch (e) {
    Swal.fire('Error','Gagal mengirim data. Coba lagi nanti.','error');
    btn.innerText = originalText;
    btn.disabled = false;
  }
}

window.onload = () => { listenToSlots(); };
</script>
</body>
</html>
