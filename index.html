<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dallas Joki — Joki Game #1 Terpercaya</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
  :root {
    --bg:       #080c14;
    --bg2:      #0d1220;
    --surface:  #161d2e;
    --surface2: #1c2640;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --blue:     #3b82f6;
    --blue2:    #60a5fa;
    --gold:     #f59e0b;
    --gold2:    #fbbf24;
    --green:    #22c55e;
    --text:     #f1f5f9;
    --muted:    #64748b;
    --muted2:   #94a3b8;
    --r:        14px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
  
  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 64px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem; background: rgba(8,12,20,0.88); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 0.7rem; font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; }
  .logo-icon { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg,var(--blue),#1d4ed8); display:flex; align-items:center; justify-content:center; }
  .logo-icon img { width:100%; height:100%; object-fit:cover; }
  .logo span { color: var(--blue2); }

  /* BANNER SLIDER - SET TO 16:9 */
  .banner { 
    margin-top: 64px; 
    position: relative; 
    overflow: hidden; 
    width: 100%;
    aspect-ratio: 16 / 9; /* Mengunci rasio gambar 16:9 */
    max-height: 80vh;    /* Mencegah terlalu tinggi di layar desktop besar */
    background: #000;
  }
  .banner-track { display: flex; height: 100%; transition: transform 0.65s cubic-bezier(.77,0,.18,1); }
  .banner-slide { min-width: 100%; height: 100%; position: relative; overflow: hidden; }
  
  .banner-img { 
    position: absolute; 
    inset: 0; 
    width: 100%; 
    height: 100%; 
    object-fit: cover; /* Gambar memenuhi kotak tanpa gepeng */
    object-position: center;
    z-index: 1; 
  }

  /* Hilangkan teks/tombol di dalam banner */
  .banner-content { display: none !important; }

  .banner-arr { position:absolute; top:50%; transform:translateY(-50%); z-index:10; width:36px; height:36px; background:rgba(0,0,0,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; border: 1px solid rgba(255,255,255,0.2); }
  .banner-prev { left:1rem; }
  .banner-next { right:1rem; }
  .banner-dots { position:absolute; bottom:1rem; left:50%; transform:translateX(-50%); display:flex; gap:0.5rem; z-index:10; }
  .bdot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.3); cursor:pointer; }
  .bdot.active { background:#fbbf24; width:20px; border-radius:4px; }

  /* HERO & LAINNYA */
  .hero { padding: 4rem 2rem; text-align: center; }
  .hero h1 { font-family: 'Syne', sans-serif; font-size: 3rem; margin-bottom: 1rem; }
  .hero p { color: var(--muted2); max-width: 600px; margin: 0 auto 2rem; }
  
  .container { max-width: 1180px; margin: 0 auto; padding: 2rem; }
  .joki-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
  .joki-card { background: var(--surface); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); text-decoration: none; color: inherit; }
  .joki-card img { width: 100%; height: auto; }
  .jcard-body { padding: 1rem; }

  footer { padding: 2rem; text-align: center; border-top: 1px solid var(--border); margin-top: 4rem; }
  </style>
</head>
<body>

<nav>
  <a href="#" class="logo">
    <div class="logo-icon"><img src="assets/dallas.png" alt=""></div>
    Dallas <span>JOKI</span>
  </a>
  <div class="nav-links"></div>
</nav>

<div class="banner">
  <div class="banner-track" id="bannerTrack">
    <div class="banner-slide">
      <img class="banner-img" src="assets/ftkun.png" alt="Slide 1">
      <div class="banner-content"></div>
    </div>
    <div class="banner-slide">
      <img class="banner-img" src="assets/ff.png" alt="Slide 2">
      <div class="banner-content"></div>
    </div>
    <div class="banner-slide">
      <img class="banner-img" src="assets/rank.png" alt="Slide 3">
      <div class="banner-content"></div>
    </div>
    <div class="banner-slide">
      <img class="banner-img" src="assets/mabar.png" alt="Slide 4">
      <div class="banner-content"></div>
    </div>
  </div>
  
  <div class="banner-arr banner-prev" onclick="bannerMove(-1)">&#8249;</div>
  <div class="banner-arr banner-next" onclick="bannerMove(1)">&#8250;</div>
  
  <div class="banner-dots" id="bannerDots">
    <div class="bdot active" onclick="bannerGoTo(0)"></div>
    <div class="bdot" onclick="bannerGoTo(1)"></div>
    <div class="bdot" onclick="bannerGoTo(2)"></div>
    <div class="bdot" onclick="bannerGoTo(3)"></div>
  </div>
</div>

<section class="hero">
  <h1>Naik Rank Cepat & Aman</h1>
  <p>Layanan joki game profesional dengan proses instan dan privasi terjaga.</p>
</section>

<section class="container">
  <div class="joki-grid">
    <a href="#" class="joki-card">
      <img src="assets/rank.png" alt="">
      <div class="jcard-body"><h3>Joki Rank ML</h3><p>Mulai Rp 5.500</p></div>
    </a>
    <a href="#" class="joki-card">
      <img src="assets/ff.png" alt="">
      <div class="jcard-body"><h3>Joki Rank FF</h3><p>Mulai Rp 20.000</p></div>
    </a>
  </div>
</section>

<footer>
  <p>© 2026 Dallas Joki. All rights reserved.</p>
</footer>

<script>
  let cur = 0;
  const track = document.getElementById('bannerTrack');
  const dots = document.querySelectorAll('.bdot');
  const total = dots.length;

  function goTo(n) {
    cur = (n + total) % total;
    track.style.transform = `translateX(-${cur * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === cur));
  }

  window.bannerMove = (d) => goTo(cur + d);
  window.bannerGoTo = (n) => goTo(n);

  setInterval(() => goTo(cur + 1), 5000);
</script>

</body>
</html>
